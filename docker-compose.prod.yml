# ═══════════════════════════════════════════════════════════════════
# Evalco Dashboard — Production Stack (Hetzner)
#
# Services:
#   app         — Next.js dashboard (port 3000)
#   worker      — BullMQ sync worker
#   redis       — Queue backend
#   clickhouse  — Analytics data store
#   nginx       — Reverse proxy with SSL
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
# ═══════════════════════════════════════════════════════════════════

services:
  # ─── Next.js App ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evalco-app
    restart: always
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=evalco
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-evalco_prod}
      - CLICKHOUSE_DATABASE=evalco
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - evalco-net

  # ─── Sync Worker ───
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: evalco-worker
    restart: always
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=evalco
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-evalco_prod}
      - CLICKHOUSE_DATABASE=evalco
      - WORKER_CONCURRENCY=3
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - evalco-net

  # ─── Redis (Queue Backend) ───
  redis:
    image: redis:7-alpine
    container_name: evalco-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - evalco-net

  # ─── ClickHouse (Analytics) ───
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: evalco-clickhouse
    restart: always
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/clickhouse-init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_USER: evalco
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-evalco_prod}
      CLICKHOUSE_DB: evalco
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--user", "evalco", "--password", "${CLICKHOUSE_PASSWORD:-evalco_prod}", "--query", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - evalco-net

  # ─── Nginx (Reverse Proxy + SSL) ───
  nginx:
    image: nginx:alpine
    container_name: evalco-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - evalco-net

  # ─── Certbot (SSL Certificates) ───
  certbot:
    image: certbot/certbot
    container_name: evalco-certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  redis_data:
  clickhouse_data:
  certbot_data:
  certbot_certs:


networks:
  evalco-net:
    driver: bridge
